# Physics schemes demonstration example
driver:
  start_time: "2020-01-01T00:00:00"
  end_time: "2020-01-02T00:00:00"
  timestep_seconds: 3600

grid:
  nx: 6
  ny: 4
  lon_min: -180.0
  lon_max: 180.0
  lat_min: -90.0
  lat_max: 90.0

species:
  no:
    - field: "HTAP_NO"
      operation: "add"

physics_schemes:
  - name: "DayCycleAndSeasonVariation"
    options:
      amplitude_diurnal: 0.5
      phase_diurnal_hours: 14.0
      amplitude_seasonal: 0.3
      phase_seasonal_days: 180.0

cece_data:
  streams:
    - name: "HTAP_NO"
      file: "/work/data/HTAPv3_NO_0.1x0.1_2018.nc"
      yearFirst: 2018
      yearLast: 2018
      yearAlign: 2020
      variables:
        - file: "NO_SHP"
          model: "HTAP_NO"

diagnostics:
  output_interval_seconds: 3600
  variables: ["no"]
