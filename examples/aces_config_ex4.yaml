physics_schemes:
  - name: "GFED"
    language: "cpp"
    options:
      version: "GFED4"

species:
  co:
    - field: "MACCITY_CO"
      category: "anthropogenic"
      hierarchy: 1
      operation: "add"

aces_data:
  streams:
    - name: "MACCITY_CO"
      file: "data/MACCity_4x5.nc"
      variables:
        - file: "MACCity"
          model: "MACCITY_CO"
    - name: "GFED_WDL"
      file: "data/GFED4_gen.025x025.199701.nc"
      variables:
        - file: "DM_TOTL"
          model: "GFED_WDL"

diagnostics:
  output_interval_seconds: 3600
  variables: ["co"]
