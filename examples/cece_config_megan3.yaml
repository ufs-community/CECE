# MEGAN3 + BDSNP Example Configuration
#
# Demonstrates the full MEGAN3 biogenic emission system with:
#   - BDSNP soil NO module (runs first, writes soil_nox_emissions)
#   - MEGAN3 multi-species scheme (runs second, reads soil_nox_emissions)
#   - CB6 chemical mechanism speciation
#   - Per-class emission coefficients
#   - Input/output field mappings
#
# The stacking engine executes BDSNP before MEGAN3 so that soil NO
# is available in the export state when MEGAN3 reads it for the NO class.

driver:
  start_time: "2020-07-01T00:00:00"
  end_time: "2020-07-01T06:00:00"
  timestep_seconds: 3600

grid:
  nx: 10
  ny: 10
  lon_min: -100.0
  lon_max: -80.0
  lat_min: 30.0
  lat_max: 45.0

physics_schemes:
  # --- BDSNP Soil NO Module (runs first) ---
  - name: bdsnp
    options:
      soil_no_method: bdsnp # "bdsnp" (default) or "yl95"
      fert_emission_factor: 1.0
      wet_dep_scaling: 1.0
      dry_dep_scaling: 1.0
      pulse_decay_constant: 0.5
    input_mapping:
      soil_temperature: TSOIL
      soil_moisture: GWETTOP
      nitrogen_deposition: NDEP
      land_use_type: LANDTYPE
      leaf_area_index: LAI
      biome_emission_factors: BIOME_EF
    output_mapping:
      soil_nox_emissions: SOIL_NO

  # --- MEGAN3 Multi-Species Biogenic Emissions (runs second) ---
  - name: megan3
    options:
      mechanism_file: data/speciation/spc_cb6.yaml
      speciation_file: data/speciation/map_cb6.yaml
      speciation_dataset: MEGAN
      co2_concentration: 415.0
      co2_method: possell # "possell" or "wilkinson"
      enable_wind_stress: false
      enable_temp_stress: false
      enable_aq_stress: false
      emission_classes:
        ISOP:
          ldf: 0.9996
          ct1: 95.0
          cleo: 2.0
          beta: 0.13
          anew: 0.05
          agro: 0.6
          amat: 1.0
          aold: 0.9
          default_aef: 1.0e-9
        MBO:
          ldf: 0.80
          ct1: 80.0
          cleo: 1.83
          beta: 0.13
          anew: 0.05
          agro: 0.6
          amat: 1.0
          aold: 0.9
          default_aef: 2.0e-10
