# Regional masking example with European focus
driver:
  start_time: "2020-01-01T00:00:00"
  end_time: "2020-01-01T02:00:00"
  timestep_seconds: 3600

grid:
  nx: 8
  ny: 6
  lon_min: -20.0
  lon_max: 40.0
  lat_min: 35.0
  lat_max: 70.0

meteorology:
  mask_europe: MASK_EUROPE

species:
  co:
    - field: "MACCITY_CO"
      category: "anthropogenic"
      hierarchy: 1
      operation: "add"
    - field: "EMEP_CO"
      category: "anthropogenic"
      hierarchy: 2
      operation: "replace"
      mask: "mask_europe"

cece_data:
  streams:
    - name: "MACCITY_CO"
      file: "/work/data/MACCity_4x5.nc"
      yearFirst: 2000
      yearLast: 2010
      yearAlign: 2020
      variables:
        - file: "MACCity"
          model: "MACCITY_CO"
    - name: "EMEP_CO"
      file: "/work/data/EMEP.2000.co.nc"
      yearFirst: 2000
      yearLast: 2010
      yearAlign: 2020
      variables:
        - file: "MACCity"
          model: "EMEP_CO"
    - name: "MASK_EUROPE"
      file: "/work/data/Canada_mask.gen.1x1.nc"
      variables:
        - file: "MASK"
          model: "MASK_EUROPE"
