# ACES equivalent of HEMCO Example 3
species:
  co:
    - field: "MACCITY_CO"
      category: 1
      hierarchy: 1
      operation: "add"
    - field: "AEIC_CO"
      category: 2
      hierarchy: 1
      operation: "add"

cdeps_config:
  streams:
    - name: "MACCITY_CO"
      file_path: "data/MACCity.nc"
    - name: "AEIC_CO"
      file_path: "data/AEIC.nc"
