# Simple testing configuration with minimal grid
driver:
  start_time: "2020-01-01T00:00:00"
  end_time: "2020-01-01T01:00:00"
  timestep_seconds: 3600

grid:
  nx: 2
  ny: 2
  lon_min: -180.0
  lon_max: 180.0
  lat_min: -90.0
  lat_max: 90.0

species:
  co:
    - field: "MACCITY_CO"
      category: "anthropogenic"
      hierarchy: 1
      operation: "add"

cece_data:
  streams:
    - name: "MACCITY_CO"
      file: "/work/data/MACCity_4x5.nc"
      variables:
        - file: "MACCity"
          model: "MACCITY_CO"

diagnostics:
  output_interval_seconds: 3600
  variables: ["co"]
