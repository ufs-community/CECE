# CB6_AE7 Speciation Mapping File (CECE dataset-oriented format)
# Maps 19 MEGAN3 emission classes directly to CB6_AE7 mechanism species
# with per-class scale factors.
#
# Format: mechanism species → { emission class: scale factor }
# Scale factors represent the fractional contribution of each emission class
# to each mechanism species.
#
# References:
#   - CMAQ MEGAN3 MAP_CV2CB6AE7.EXT
#   - Guenther et al. (2012) MEGAN3 speciation profiles
mechanism: CB6_AE7
datasets:
  MEGAN:
    ISOP:
      ISOP: 1.0
    TERP:
      MT_PINE: 0.5
      MT_ACYC: 0.3
      MT_CAMP: 0.1
      MT_SABI: 0.05
      MT_AROM: 0.05
