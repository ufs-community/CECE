[project]
site_name = "CECE Documentation"
site_description = "Community Emissions Computing Engine"
site_author = "CECE Team"
copyright = "Copyright &copy; 2026 CECE Authors"

nav = [
    { "Introduction" = "index.md" },
    { "Core Concepts" = "concepts.md" },
    { "User's Guide" = "users-guide.md" },
    { "Configuration" = "configuration.md" },
    { "Tutorial" = "tutorial.md" },
    { "Scripts & Utilities" = "scripts.md" },
    { "Examples" = "examples.md" },
    { "Migration Examples" = "migration_examples.md" },
    { "API Reference" = "api.md" }
]

[project.theme]
name = "material"
features = [
    "content.code.annotate",
    "content.code.copy",
    "navigation.footer",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.plugins.mkdoxy]
projects = { cece = { src-dirs = "include/cece", full-doc = true, doxy-cfg = { RECURSIVE = "YES", GENERATE_XML = "YES" } } }
