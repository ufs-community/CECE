[project]
site_name = "ACES Documentation"
site_description = "Accelerated Component for Emission System"
site_author = "ACES Team"
copyright = "Copyright &copy; 2026 ACES Authors"

[project.theme]
name = "material"

[project.theme.features]
features = [
    "content.code.annotate",
    "content.code.copy",
    "navigation.footer",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.plugins.mkdoxy]
projects = { aces = { src-dirs = "include/aces", full-doc = true, doxy-cfg = { RECURSIVE = "YES", GENERATE_XML = "YES" } } }

[project.nav]
"Introduction" = "index.md"
"User's Guide" = "users-guide.md"
"Configuration" = "configuration.md"
"Tutorial" = "tutorial.md"
"API Reference" = "api.md"
