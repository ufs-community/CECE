# Config for parity test using CDEPS and Physics
driver:
  nx: 4
  ny: 4
  nz: 1

# Meteorolgy mapping for ESMF fields
meteorology:
  wind_speed_10m: "wind_speed_10m"
  tskin: "tskin"
  DMS_seawater: "DMS_seawater"

species:
  co:
    - field: "MACCITY_CO"
      operation: "add"
      scale: 1.0
      hierarchy: 1
      scale_fields: ["HOURLY_SCALFACT"]
  dms:
    - field: "DMS_seawater"
      operation: "add"
      scale: 1.0
      hierarchy: 1

physics_schemes:
  - name: "dms"
    language: "cpp"
    options:
      schmidt_coeff: [2674.0, -147.12, 3.726, -0.038]
      kw_coeff: [0.222, 0.333]
      input_mapping:
        wind_speed: "wind_speed_10m"
        tskin: "tskin"
        seawater_conc: "DMS_seawater"
      output_mapping:
        dms_emissions: "dms"

aces_data:
  streams:
    - name: "test_inventory"
      file: ["tests/data/test_emissions.nc"]
      variables:
        - file: "CO_EMIS"
          model: "MACCITY_CO"
      taxmode: "cycle"
      tintalgo: "linear"
      mapalgo: "bilinear"
      yearFirst: 2024
      yearLast: 2024
      yearAlign: 2024
