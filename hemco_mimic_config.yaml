# HEMCO Mimic Example Configuration
# This config demonstrates a "Regional Override" using ACES.

# Meteorology mapping
meteorology:
  temperature: "air_temperature"

species:
  nox:
    # 1. Base Global Layer (equivalent to HEMCO Base Emissions)
    - field: "base_nox"
      operation: "add"
      scale: 1.0
      category: "anthropogenic"
      hierarchy: 1

    # 2. Regional Override (equivalent to HEMCO with higher hierarchy and mask)
    # This will REPLACE the base layer wherever 'mask_europe' is non-zero.
    - field: "europe_nox"
      operation: "replace"
      scale: 1.2
      category: "anthropogenic"
      hierarchy: 10
      mask: "mask_europe"

# Dummy physics schemes
physics_schemes: []
