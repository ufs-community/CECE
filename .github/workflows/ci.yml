name: Run all CI tests
on: [pull_request, push]

jobs:
  run_all_tests:
    runs-on: ubuntu-latest
    name: Full CI (ACES)
    container: jcsda/docker-gnu-openmpi-dev:1.9
    steps:

    - name: Checkout
      uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: Cache dependencies and build
      uses: actions/cache@v3
      with:
        path: |
          build/_deps
          build/lib
          build/bin
        key: ${{ runner.os }}-aces-deps-${{ hashFiles('**/CMakeLists.txt', 'cmake/*.cmake') }}
        restore-keys: |
          ${{ runner.os }}-aces-deps-

    - name: Build and Test ACES
      shell: bash
      run: |
        if [ -f /opt/spack-environment/activate.sh ]; then
          source /opt/spack-environment/activate.sh
        fi

        if command -v spack &> /dev/null; then
          spack install cdeps || true
          spack load cdeps || true
        fi

        # Ensure build directory exists
        mkdir -p build
        cd build

        # Configure ACES. CMake will detect if it's already configured.
        cmake .. -DACES_USE_MOCK_ESMF=OFF -DCMAKE_BUILD_TYPE=Release -DKokkos_ENABLE_SERIAL=ON

        # Build. Make will only build what has changed.
        make -j$(nproc)
        ctest --output-on-failure

    - name: Run HEMCO Parity Examples
      shell: bash
      run: |
        if [ -f /opt/spack-environment/activate.sh ]; then
          source /opt/spack-environment/activate.sh
        fi

        ./scripts/setup_hemco_examples.sh
        ./scripts/data_download/download_ex1.sh
        ./scripts/verify_hemco_data.py data/MACCity_4x5.nc

        # Mock scale factor for CI
        cp data/MACCity_4x5.nc data/hourly.nc

        cp examples/aces_config_ex1.yaml aces_config.yaml
        export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$(pwd)/build
        ./build/standalone_nuopc/aces_nuopc_driver
