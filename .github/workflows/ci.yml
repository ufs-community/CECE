name: Run all CI tests
on: [pull_request, push]

jobs:
  run_all_tests:
    runs-on: ubuntu-latest
    name: Full CI (ACES)
    container: jcsda/docker-gnu-openmpi-dev:1.9
    steps:

    - name: Checkout
      uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: Build and Test ACES
      shell: bash
      run: |
        # Source the Spack environment to load compilers and libraries (ESMF, etc.)
        if [ -f /opt/spack-environment/activate.sh ]; then
          source /opt/spack-environment/activate.sh
        fi

        # Install CDEPS with spack if available
        if command -v spack &> /dev/null; then
          spack install cdeps
          spack load cdeps
        fi

        # Create build directory
        mkdir -p build
        cd build

        # Configure ACES
        # - ACES_USE_MOCK_ESMF=OFF: Force use of system ESMF provided by the container
        cmake .. -DACES_USE_MOCK_ESMF=OFF -DCMAKE_BUILD_TYPE=Release

        # Build
        make -j4

        # Test
        ctest --output-on-failure

    - name: Run HEMCO Parity Examples
      shell: bash
      run: |
        if [ -f /opt/spack-environment/activate.sh ]; then
          source /opt/spack-environment/activate.sh
        fi

        # Setup examples
        ./scripts/setup_hemco_examples.sh

        # Download data for Example 1 (MACCity CO and hourly scale factors)
        # Note: These are example paths on the S3 bucket
        mkdir -p data
        ./scripts/download_hemco_data.py HEMCO/MACCITY/v2014-10/MACCity_2000.nc -o data/MACCity.nc

        # Verify data
        ./scripts/verify_hemco_data.py data/MACCity.nc --vars CO

        # Run Example 1 with Standalone Driver
        cp examples/aces_config_ex1.yaml aces_config.yaml

        # Download a real (small) NetCDF to use as a proxy for hourly.nc if needed.
        # For now, we will use the MACCity file as its own scale factor for testing purposes.
        cp data/MACCity.nc data/hourly.nc

        # Build/standalone_nuopc/aces_nuopc_driver is the path
        # But we need to make sure the library is in the path for the executable to find it.
        export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$(pwd)/build
        ./build/standalone_nuopc/aces_nuopc_driver
