name: Deploy Documentation
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen
          npm install -g moxygen@0.10.1
          python3 -m pip install --upgrade pip
          python3 -m pip install zensical mkdocs-material

      - name: Generate API Documentation
        run: |
          doxygen Doxyfile
          moxygen -o docs/api.md docs/api/xml
          rm -rf docs/api

      - name: Build documentation
        run: zensical build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
