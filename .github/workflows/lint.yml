name: Lint and Format
on: [pull_request, push]

jobs:
  format-and-lint:
    runs-on: ubuntu-latest
    container: jcsda/docker-gnu-openmpi-dev:1.9
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Install Clang-Format and Clang-Tidy
      run: |
        # Add LLVM repo for clang-format
        apt-get update -qq
        apt-get install -y -qq wget lsb-release software-properties-common gnupg
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add -
        add-apt-repository "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs) main"
        apt-get update -qq
        # Install clang-format via pip for a consistent pinned version across CI and local dev
        apt-get install -y -qq python3-pip clang-tidy || true
        pip3 install clang-format==22.1.2
        clang-format --version

    - name: Run Clang-Format Check
      run: |
        find src include tests -name "*.cpp" -o -name "*.hpp" | xargs clang-format --dry-run --Werror

