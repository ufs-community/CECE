name: Lint and Format
on: [pull_request, push]

jobs:
  format-and-lint:
    runs-on: ubuntu-latest
    container: jcsda/docker-gnu-openmpi-dev:1.9
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Install Clang-Format and Clang-Tidy
      run: |
        apt-get update
        apt-get install -y clang-format clang-tidy

    - name: Run Clang-Format Check
      run: |
        find src include tests -name "*.cpp" -o -name "*.hpp" | xargs clang-format --dry-run --Werror

    - name: Run Clang-Tidy
      shell: bash
      run: |
        if [ -f /opt/spack-environment/activate.sh ]; then
          source /opt/spack-environment/activate.sh
        fi
        # Add MPI and other dependency paths to CPATH so clang-tidy can find headers like omp.h
        export CPATH=$CPATH:/usr/lib/gcc/x86_64-linux-gnu/13/include

        mkdir -p build && cd build
        cmake .. -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        cd ..
        # Explicitly only check ACES source files to avoid checking dependencies
        # like yaml-cpp or CDEPS that might be in the build directory.
        # Filter the compilation database to only include ACES source and test files.
        # This strictly prevents linting third-party dependencies located in build/_deps.
        # It also ensures only C/C++ source files are processed.
        python3 -c "import json, os; db=json.load(open('build/compile_commands.json')); workspace=os.getcwd(); db=[e for e in db if (e['file'].startswith(workspace) and any(x in e['file'] for x in ['/src/', '/tests/', '/standalone_nuopc/', '/include/']) and not '_deps' in e['file'] and e['file'].lower().endswith(('.cpp', '.hpp', '.c', '.h')))]; json.dump(db, open('build/compile_commands.json', 'w'))"
        # Run clang-tidy on the filtered database.
        run-clang-tidy -p build
