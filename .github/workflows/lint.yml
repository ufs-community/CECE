name: Lint and Format
on: [pull_request, push]

jobs:
  format-and-lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Install Clang-Format and Cppcheck
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format cppcheck

    - name: Run Clang-Format Check
      run: |
        find src include tests -name "*.cpp" -o -name "*.hpp" | xargs clang-format --dry-run --Werror

    - name: Run Cppcheck
      run: |
        cppcheck --enable=all --suppress=missingIncludeSystem --suppress=missingInclude --suppress=unusedFunction -I include --error-exitcode=1 src include
